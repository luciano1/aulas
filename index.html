<!DOCTYPE html>
<html>
<head>
    <title>Tags Básicas</title>
</head>
<body>

    <!-- Título principal -->
    <h1>Exemplo de HTML</h1>

    <!-- Subtítulos -->
    <h2>Subtítulo nível 2</h2>
    <h3>Subtítulo nível 3</h3>

    <!-- Parágrafo -->
    <p>Este é um parágrafo simples.</p>

    <!-- Quebra de linha -->
    <p>
        Linha 1<br>
        Linha 2
    </p>

    <!-- Linha horizontal -->
    <hr>

    <!-- Negrito -->
    <p>Texto em <b>negrito</b>.</p>

    <!-- Itálico -->
    <p>Texto em <i>itálico</i>.</p>

    <!-- Destaque -->
    <p>Texto com <mark>destaque</mark>.</p>

    <!-- Texto menor -->
    <p>Texto normal e <small>menor</small>.</p>

    <!-- Sobrescrito -->
    <p>2<sup>2</sup> = 4</p>

    <!-- Subscrito -->
    <p>H<sub>2</sub>O</p>

</body>
</html>
